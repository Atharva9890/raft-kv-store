x-peers: &peers
  PEERS: "node1=node1:9001,node2=node2:9001,node3=node3:9001,node4=node4:9001,node5=node5:9001"
  PUBLIC_ADDRS: "node1=localhost:9101,node2=localhost:9102,node3=localhost:9103,node4=localhost:9104,node5=localhost:9105"
  LISTEN_ADDR: ":9001"
  DATA_DIR: "/data"

services:
  node1:
    build: .
    environment:
      <<: *peers
      NODE_ID: node1
    ports: ["9101:9001"]
    volumes: ["./data/node1:/data"]

  node2:
    build: .
    environment:
      <<: *peers
      NODE_ID: node2
    ports: ["9102:9001"]
    volumes: ["./data/node2:/data"]

  node3:
    build: .
    environment:
      <<: *peers
      NODE_ID: node3
    ports: ["9103:9001"]
    volumes: ["./data/node3:/data"]

  node4:
    build: .
    environment:
      <<: *peers
      NODE_ID: node4
    ports: ["9104:9001"]
    volumes: ["./data/node4:/data"]

  node5:
    build: .
    environment:
      <<: *peers
      NODE_ID: node5
    ports: ["9105:9001"]
    volumes: ["./data/node5:/data"]
