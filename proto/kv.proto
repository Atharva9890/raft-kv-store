syntax = "proto3";

package kv;

option go_package = "github.com/Atharva9890/raft-kv-store/proto/kvpb";

// client-facing service. every RPC has to be served by the current
// leader - followers reply with not_leader so the client knows to
// redirect instead of getting a wrong answer.
service KV {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bool found = 1;
  string value = 2;
  string leader_hint = 3; // set when not_leader is true
  bool not_leader = 4;
}

message PutRequest {
  string key = 1;
  string value = 2;
}

message PutResponse {
  bool ok = 1;
  string leader_hint = 2;
  bool not_leader = 3;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool ok = 1;
  string leader_hint = 2;
  bool not_leader = 3;
}

// internal peer-to-peer protocol between cluster members. clients
// never call this directly.
service Raft {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

message RequestVoteRequest {
  uint64 term = 1;
  string candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

message LogEntry {
  uint64 term = 1;
  uint64 index = 2;
  bytes command = 3; // opaque to raft itself, decoded by whatever's on the other end of applyCh
}

message AppendEntriesRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5; // empty = just a heartbeat
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  // conflict_index/conflict_term let the leader jump straight to
  // where a follower's log actually diverges instead of decrementing
  // nextIndex one entry at a time - see replicateToPeer in raft/log.go.
  uint64 conflict_index = 3;
  uint64 conflict_term = 4;
}

message InstallSnapshotRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  bytes data = 5; // the whole state machine snapshot, sent in one shot
}

message InstallSnapshotResponse {
  uint64 term = 1;
}
